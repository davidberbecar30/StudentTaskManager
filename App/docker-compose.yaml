services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: studenttaskmanager
      POSTGRES_USER: davidberbecar
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  student-task-manager:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/studenttaskmanager
      SPRING_DATASOURCE_USERNAME: davidberbecar
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      - postgres
volumes:
  postgres-data: